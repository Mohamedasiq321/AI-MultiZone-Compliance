{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Solvify</title>
  <style>
    /* Google Fonts */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #273c75, #192a56);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-container {
      width: 380px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 40px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(-20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .login-container h2 {
      color: #192a56;
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    input[type=text], input[type=password] {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0 20px 0;
      border-radius: 8px;
      border: 1px solid #dcdde1;
      font-size: 0.95rem;
      transition: border 0.3s, box-shadow 0.3s;
    }

    input[type=text]:focus, input[type=password]:focus {
      border: 1px solid #192a56;
      box-shadow: 0 0 8px rgba(25,42,86,0.2);
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #192a56;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }

    .btn:hover {
      background: #273c75;
      transform: translateY(-2px);
    }

    .error {
      background: #ffdddd;
      color: #c23616;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      text-align: center;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }

    .footer {
      margin-top: 25px;
      font-size: 0.85rem;
      color: #718093;
    }

    /* Decorative circles */
    .login-container::before {
      content: '';
      position: absolute;
      width: 200px;
      height: 200px;
      background: rgba(39,60,117,0.15);
      border-radius: 50%;
      top: -80px;
      right: -80px;
    }

    .login-container::after {
      content: '';
      position: absolute;
      width: 150px;
      height: 150px;
      background: rgba(25,42,86,0.1);
      border-radius: 50%;
      bottom: -60px;
      left: -60px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Admin Login</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button class="btn" type="submit">Login</button>
    </form>
    <div class="footer">© 2025 Solvify</div>
  </div>
</body>
</html>
