{% extends "base.html" %}
{% block title %}Create Employee{% endblock %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
body {
    background-color: #121212;
    color: #e2e2e2;
}

h2 {
    margin-bottom: 30px;
    font-weight: 700;
    color: #3b82f6;
    text-align: center;
}

.form-container {
    max-width: 600px;
    margin: auto;
    padding: 30px;
    background-color: #1f1f1f;
    border-radius: 1rem;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.form-container label {
    font-weight: 600;
    color: #cbd5e1;
}

.form-control {
    background-color: #2a2a2a;
    color: #e2e2e2;
    border: 1px solid #3b82f6;
    border-radius: 0.5rem;
    padding: 10px;
    transition: all 0.3s;
}

.form-control:focus {
    background-color: #2a2a2a;
    color: #e2e2e2;
    border-color: #3b82f6;
    box-shadow: 0 0 10px rgba(59,130,246,0.5);
}

.btn-submit {
    background-color: #3b82f6;
    color: #fff;
    font-weight: 600;
    border-radius: 50px;
    padding: 10px 25px;
    transition: all 0.3s;
    width: 100%;
    margin-top: 15px;
}

.btn-submit:hover {
    background-color: #2563eb;
    box-shadow: 0 5px 15px rgba(59,130,246,0.4);
}

</style>

<div class="form-container">
    <h2>Create Employee</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn-submit" type="submit"><i class="fas fa-user-plus me-2"></i>Create Employee</button>
    </form>
</div>
{% endblock %}
